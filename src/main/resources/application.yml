spring:
  application:
    name: bike-back

  datasource:
    url: ${SPRING_DATASOURCE_URL:${DATABASE_URL:}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:}}
    driver-class-name: org.postgresql.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true

  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:${REDIS_URL:}}
      repositories:
        enabled: false

server:
  port: ${PORT:8080}

management:
  server:
    port: ${MANAGEMENT_PORT:18081}
    address: ${MANAGEMENT_SERVER_ADDRESS:0.0.0.0}
  endpoints:
    web:
      exposure:
        include: health,prometheus
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: ${spring.application.name}
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true

auth:
  jwt:
    secret: ${AUTH_JWT_SECRET}
    issuer: ${AUTH_JWT_ISSUER:bike-back}
    token-validity-sec: ${AUTH_JWT_TOKEN_VALIDITY_SEC:900}
