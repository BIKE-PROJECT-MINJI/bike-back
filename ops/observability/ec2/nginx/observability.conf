server {
    listen 80;
    server_name observability.gajabike.shop;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name observability.gajabike.shop;

    ssl_certificate /etc/letsencrypt/live/observability.gajabike.shop/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/observability.gajabike.shop/privkey.pem;

    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy same-origin always;

    auth_basic "BIKE Observability";
    auth_basic_user_file /etc/nginx/.htpasswd-bike-observability;

    location = /prom-remote-write {
        satisfy any;
        allow 210.113.127.207;
        deny all;
        auth_basic off;
        proxy_pass http://127.0.0.1:9090/api/v1/write;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
