global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: bike-back-app
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - host.docker.internal:18081

  - job_name: postgres-exporter
    static_configs:
      - targets:
          - postgres-exporter:9187

  - job_name: redis-exporter
    static_configs:
      - targets:
          - redis-exporter:9121

  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090
