name: bike-back-cloudwatch-dashboard-apply

on:
  workflow_dispatch:
    inputs:
      dashboard_name:
        description: "CloudWatch dashboard name"
        required: true
        default: "bike-back-observability"
        type: string

permissions:
  id-token: write
  contents: read

concurrency:
  group: bike-back-cloudwatch-dashboard-apply-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  APP_INSTANCE_ID: ${{ vars.APP_INSTANCE_ID }}

jobs:
  apply-dashboard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required settings
        env:
          AWS_DEPLOY_ROLE_ARN: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
        run: |
          set -euo pipefail
          for value in AWS_DEPLOY_ROLE_ARN APP_INSTANCE_ID; do
            if [ -z "${!value:-}" ]; then
              printf '[ERROR] Missing required setting: %s\n' "$value" >&2
              printf '[ERROR] Missing required setting: %s\n' "$value" >&2
              exit 1
            fi
          done

      - name: Configure AWS credentials with GitHub OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Render dashboard body
        env:
          DASHBOARD_NAME: ${{ github.event.inputs.dashboard_name }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          from pathlib import Path
          import os
          body = (Path('ops/observability/cloudwatch_dashboard_bike_observability.json').read_text(encoding='utf-8'))
          body = body.replace('${APP_INSTANCE_ID}', os.environ['APP_INSTANCE_ID'])
          Path('dashboard-body.json').write_text(body, encoding='utf-8')
          PY

      - name: Apply dashboard
        env:
          DASHBOARD_NAME: ${{ github.event.inputs.dashboard_name }}
        run: |
          set -euo pipefail
          DASHBOARD_BODY="$(python3 - <<'PY'
          import json
          from pathlib import Path
          print(json.dumps(json.loads(Path('dashboard-body.json').read_text(encoding='utf-8'))))
          PY
          )"
          aws cloudwatch put-dashboard --dashboard-name "$DASHBOARD_NAME" --dashboard-body "$DASHBOARD_BODY"
